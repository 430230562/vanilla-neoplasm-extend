content.planet.name = 行星

planet.vne-ochre.name = 奥卡
planet.vne-ochre.description = 远离太阳的气态巨星.\n其内部金属氢作用产生的强辐射使探测计划频频受阻,相关研究仍在推进.
planet.vne-seltis.name = 瑟尔提斯
planet.vne-seltis.description = 一颗远离气态巨行星(奥卡)的卫星之一,远古时期曾被广阔海洋覆盖,如今地表液态水近乎消失,只留下广袤无垠的盐壳荒漠与干涸海床,残留水体含盐量极高.

sector.vne-[Neop1]fumarole.name = 喷气荒原
sector.vne-[Neop1]fumarole.description = [lightgray]敌军已在此地建立设施，秘密开展[accent]瘤液[lightgray]相关研究。\n捣毁这座据点，断绝其后续研究计划，并收缴留存的研究成果。\n\n作者:紫菜(-YOXILIS-)
sector.vne-[Neop1]fumarole.details = 这仅仅是阴谋的开端，敌人的暗中布局，或许远比我们所见的更深。
sector.vne-[Neop2]faultline.name= 断裂地带
sector.vne-[Neop2]faultline.description = [lightgray]板块撕裂隆起，造就了这片广袤的赤红荒原。\n大地被浸染成暗红，究竟是地层本色，还是[accent]瘤液[lightgray]渗透土壤所致？答案无人知晓，但此地培养机效率的异常攀升，早已给出了隐晦的线索。\n\n敌军在此修筑三座据点，用以掩护更为危险的瘤液研究。他们的实验已初见成效，新式武器已然问世，务必多加提防。\n\n作者:紫菜(-YOXILIS-)
sector.vne-[Neop2]faultline.details = 瘤液究竟是物质异变，还是另类的生命形态？世人皆心存疑惑。研究必然催生污染，污染势必引动危机——不仅有地表文明的纷争袭扰，更有来自地底深处的未知震颤。
sector.vne-[Neop3]sinkhole.name = 陷落天坑
sector.vne-[Neop3]sinkhole.description = [lightgray]大地塌陷形成巨型天坑，坑底盘踞着大片芳油湖泊。\n此地有机质含量异常丰沛，既是绝佳的能源燃料，亦是培育瘤液造物的上等原料。\n\n敌军于坑内布设三座据点，虽未配备尖端军备，却依托厚重防御工事，足以令绝大多数来犯者望而却步。\n\n作者:紫菜(-YOXILIS-)
sector.vne-[Neop3]sinkhole.details = 幽深天坑暗藏几乎无尽的芳油资源，既是天然的能源宝库，也成了瘤液滋生繁衍的温床，危险与机遇在此交织共存。
sinkhole.i = 你感受到地下深处的震动……

status.vne-neoplasm-slow.name = 瘤液减速
status.vne-neoplasm-slow.description = 因沾染了瘤液而行动不便.
status.vne-antagonistic.name = 拮抗

liquid.vne-brine.name = 盐水
liquid.vne-brine.description = 溶解有大量无机盐的水,渗透压极高,以至于瘤液都无法在其中繁殖.\n\n在淡化之前派不上任何用途.
liquid.vne-brine.details = 别抱怨了,能在瑟尔提斯上找到液态地表水就已经很幸运了.
liquid.vne-acid.name = 酸液
liquid.vne-acid.description = 一种强酸,能腐蚀大部分物质.
liquid.vne-venous.name = 静脉血浆
liquid.vne-venous.description = 营养耗尽的血浆,颜色较深,流动性较差. \n\n可在呼吸组织中重新注入活力.
liquid.vne-nutrient.name = 营养液
liquid.vne-nutrient.description = 富含营养的液体,用于培养生物.
liquid.vne-ammonia.name = 氨气
liquid.vne-ammonia.description = NH₃气体,具有强烈的刺激性气味,是重要的化工原料.\n\n对瘤液及其赘生物似乎有抑制作用.
liquid.vne-natural-gas.name = 天然气
liquid.vne-natural-gas.description = 从芳油中提取的气体,主要成分为甲烷与乙炔.
liquid.vne-natural-gas.details = 相比于石墨,低级气态烃与反应物接触面积无疑更大.

item.vne-protein.name = 瘤蛋白块
item.vne-protein.description = 死亡的瘤液,不过没有完全死透,如果环境合适,它可能会再次恢复活性.
item.vne-salt.name = 盐
item.vne-salt.description = 普通的硝酸盐类,精制后可以用于制造炸药.
item.vne-coagulant-ingot.name = 蚀凝瘤块
item.vne-coagulant-ingot.description = 吸附有瘤液的氧化物,绽放着令人不安的颜色.其中的瘤液依旧躁动,建议用焚化炉焚毁.\n\n不过它或许还有其他用途.
item.vne-coagulant-ingot.details = 其他用途说的当然是作为弹药,它能大幅度阻滞敌人的进攻,不过...
item.vne-nickel.name = 镍
item.vne-nickel.description = 随处可见的金属,各方面性能均衡,用途广泛.
item.vne-manganese.name = 锰
item.vne-manganese.description = 不是那么常见的金属,比镍硬度更高,更脆,用于建造更坚固的建筑.其氧化物能对许多化学反应起到一定的催化作用.
item.vne-silicon-nitride.name = 氮化物
item.vne-silicon-nitride.description = 一种坚硬耐磨的材料，常用于制造耐高温和高磨损环境下的部件与结构件.
item.vne-biomass-steel.name = 生物质钢
item.vne-biomass-steel.description = 一种神奇的材料,由氧化物,碳化物和瘤蛋白块合成,具有极高的强度和韧性.\n\n它的生产过程非常复杂,但一旦成功,就能大幅提升建筑的防御能力.

unit.renale.name = 纤维瘤
unit.latum.name = 肿瘤核心

unit.vne-haploid.name = 单倍体
unit.vne-haploid.description = 初级虫群单位,向目标喷射酸液进行杀伤.吸收附近的瘤液进行自修复,死后会在当前位置留下瘤液.
unit.vne-diploid.name = 二倍体
unit.vne-diploid.description = 虫群的中坚单位,能向较远单位和建筑喷射大量酸液.吸收附近的瘤液回血,死后会留下瘤液.
unit.vne-triploid.name = 三倍体
unit.vne-triploid.description = 虫群的精英单位,其本身不能攻击,而是通过发射自杀式飞虫来攻击建筑.吸收附近的瘤液回血,死后会留下大量瘤液.
unit.vne-bivalents.name = 二价体
unit.vne-bivalents.description = 虫群的特殊单位，具有双重结构与协同作战能力，擅长近战扰乱与承受伤害。吸收附近的瘤液回血，死后会留下瘤液.
unit.vne-ribosome.name = 核糖体
unit.vne-ribosome.description = 虫群的初等单位,会跟随附近血量最高的单位,辅助其作战.吸收附近的瘤液回血,死后会留下瘤液.
unit.vne-lysosome.name = 溶酶体
unit.vne-lysosome.description = 虫群的中坚单位,借助了自身的高度优势,会向建筑投射大量酸液弹.吸收附近的瘤液回血,死后会留下瘤液.
unit.vne-trichocyst.name = 刺丝泡
unit.vne-trichocyst.description = 虫群的精英单位,发射高压的酸液流,能够击穿建筑.吸收附近的瘤液回血,死后会留下大量瘤液.
unit.vne-centrosome.name = 中心体
unit.vne-centrosome.description = 虫群的核心支援单位，能够为附近单位提供协同增益与引导攻击，吸收附近的瘤液回血，死后会留下瘤液.
unit.vne-bomber.name = 爆破者
unit.vne-bomber.description = 虫群的先遣队,通过自杀式袭击摧毁建筑,并将瘤液洒向大地.
unit.vne-cytoderm.name = 细胞壁
unit.vne-cytoderm.description = 虫群的中坚防护单位，携带酸蚀场与护盾，不能主动攻击但能为附近友军提供显著保护。吸收附近的瘤液回血，死亡后留下瘤液.
unit.vne-cytoderm.details = 大部分的高射速炮台对付其都效果不佳，建议使用能量武器。
unit.vne-adenoma.name = 腺瘤
unit.vne-polyp.name = 息肉
unit.vne-polyp.description = 粘稠的,扭曲的,蠕动的,令人作呕的一坨无定型肿瘤聚集体.移动时会留下瘤液尾迹,死后会留下大量瘤液.
unit.vne-sarcoma.name = 肉瘤
unit.vne-sarcoma.description = 粘稠的,扭曲的,蠕动的,令人作呕的一大坨无定型肿瘤聚集体.移动时会留下瘤液尾迹,死后会分裂为数块,还会留下大量瘤液.
unit.vne-metastasis.name = 转移灶

unit.vne-spore.name = 芽孢
unit.vne-mycelium.name = 菌丝体
unit.vne-sac.name = 瘤变囊

unit.vne-election.name = 微氛
unit.vne-election.description = 保护星尘核心,可以采集矿物与建造建筑,装备小型修复场.
unit.vne-atom.name = 霜华
unit.vne-atom.description = 保护月皎核心,可以采集矿物与建造建筑,装备小型修复场.
unit.vne-molecule.name = 虹晕
unit.vne-molecule.description = 日环核心的保护者,可以采集矿物与建造建筑,装备小型修复场.

block.vne-neoplasm-wall.name = 血石墙
block.vne-neoplasm-stone.name = 血石
block.vne-neoplasm-vent.name = 血石喷口(氨气)
block.vne-neoplasm-sand-wall.name = 血沙墙
block.vne-neoplasm-sand.name = 血沙
block.vne-neoplasm.name = 血池

block.vne-neop-core.name = 肿瘤之心
block.vne-neop-node.name = 瘤变维管束
block.vne-noep-turret.name = 肿瘤炮台
block.vne-spawner.name = 生成器

block.vne-ash.name = 星尘
block.vne-ash.description = 初级核心,内置了一个小型RTG发电机,可为区块的早期开发提供能源.
block.vne-albus.name = 月皎
block.vne-albus.description = 中级核心,在初级核心的基础上对容量和防护相进行了升级,更加坚固且庞大.装备矩阵护盾发生器.
block.vne-annular.name = 日环
block.vne-annular.description = 终级核心,在中级核心的基础上进行了全面升级,拥有更大的容量以及更多的接入口.装备集群护盾发生器.
block.vne-core-fix.name = 补丁方块
block.vne-core-fix.description = 如果你不知道他是干什么用的,就不要把它放在地上.

block.vne-nickel-drill.name = 镍钻头
block.vne-nickel-drill.description = 基础采矿设备,缓慢挖掘矿物,无需电力即可运行.
block.vne-nickel-drill.details = 辉煌的工业是踏在牛顿与焦耳的棺材板上建立的.
block.vne-manganese-drill.name = 锰钻头
block.vne-mangenese-drill.description = 进阶采矿设备,以普通速度挖掘矿物,无需电力,效率比镍钻头更高.
block.vne-manganese-drill.details = 听说棺材板下面还压了个法拉第.

block.vne-micro-heat-redirector.name = 微型热量传送机
block.vne-micro-heat-redirector.description = 将热量定向传送至指定方向的微型装置,可将局部热量引导至工厂或发电单元.
block.vne-small-heat-router.name = 小型热量路由器
block.vne-small-heat-router.description = 在多个方向之间分配热量的小型路由器,能平衡区域温度并稳定热能流动,适用于中等规模热网。
block.vne-micro-heat-router.name = 微型热量路由器
block.vne-micro-heat-router.description = 紧凑型热量路由器,用于小规模热网络的流向控制与分配,适合密集布局与局部热管理.

block.vne-incubator.name = 培养机
block.vne-incubator.description = 用于激发和培养环境中痕量瘤液的装置.
block.vne-incubator.details = 在埃里克尔,瘤液的残余随处可见.\n\n我们必须小心控制培养规模,严格灭活,否则这些躁动的生物随时可能脱离我们的控制.
block.vne-arkycite-refinery.name = 芳油精炼厂
block.vne-arkycite-refinery.description = 从芳油中提前石墨和生物质的工厂,会产出少量天然气.
block.vne-irradiation-chamber.name = 辐照室
block.vne-irradiation-chamber.description = 通过辐射将普通的蛋白块诱变成休眠囊肿的工厂,诱变失败的会化为瘤液.需要及时处理瘤液,否则会[accent]爆炸[].\n放射源和蛋白块并非同步消耗,实际放射源消耗速度远小于该界面显示.
block.vne-irradiation-chamber.details = 其实它的诱变成功率已经很高了.
block.vne-cyanide-plant.name = 氰化反应器
block.vne-cyanide-plant.description = 用氰气对瘤液进行暴力灭活的装置.\n有两种工作产出,可用按钮切换.
block.vne-cyanide-plant.details = 其实这种处理方法还算比较温和的,毕竟还能得到少量副产物.
block.vne-adsorbent.name = 吸附器
block.vne-adsorbent.description = 用多孔的氧化物处理瘤液的设备.\n然而只是吸附,其中的瘤液依旧危险.
block.vne-silicon-nitride-furnace.name = 氮化炉
block.vne-silicon-nitride-furnace.description = 用于生产氮化物的反应炉,副产出热量
block.vne-silicon-nitride-furnace.details = 大气收集器的好朋友.
block.vne-biomass-smelter.name = 生物质钢熔炉
block.vne-biomass-smelter.description = 用于生产生物质钢的高温炉,需要水稳定.
block.vne-stable-biomass-smelter.name = 稳定生物质钢熔炉
block.vne-stable-biomass-smelter.description = 高稳定性的生物质钢的高温炉,不需要水稳定,然而速率略低.
block.vne-ammonia-plant.name = 合成氨厂
block.vne-ammonia-plant.description = 合成氨的工厂,利用高温高压条件下的氮气和氢气合成氨气,是现代化工的重要组成部分.
block.vne-ammonia-plant.details = 虽然哈伯法已经有几百年的历史了,但它依旧是现在主流的合成方法.\n\n或许我们可以用电化学方法制取氨气,如果我们有合适的电极材料的话.
block.vne-watergas-stove.name = 水煤炉
block.vne-watergas-stove.description = 利用石墨和水反应生成氢气或天然气的装置,需要大量热量.
block.vne-BMA-stove.name = 德固萨法反应炉
block.vne-BMA-stove.description = 用低级气态烃进行各类合成的工厂,副产物为氢气.
block.vne-laser-incinerator.name = 激光焚化炉
block.vne-laser-incinerator.description = 利用高温激光焚化物品的焚化炉,真的很耗电.

block.vne-compressor.name = 压缩机
block.vne-compressor.description = 将煤炭压缩成石墨,不需要电力.
block.vne-arc-furnace.name = 电弧炉
block.vne-arc-furnace.description = 冶炼硅和钢化玻璃.
block.vne-desalination.name = 淡化厂
block.vne-desalination.description = 淡化盐水.

block.vne-atmospheric-condenser.name = 大气冷凝器
block.vne-atmospheric-condenser.description = 将大气中的水蒸汽冷凝成液态水.消耗电力.
block.vne-atmospheric-condenser.details = 我们一致认为这不算一个好主意,但如果你真的非常缺水的话,它或许还有点用.
block.vne-floor-crusher.name = 地面粉碎机
block.vne-floor-crusher.description = 粉碎易碎地面,以缓慢的速度无限产出沙子.需要少量电力.\n效率因墙的类型而异.
block.vne-floor-crusher.details = 无奖竞猜: 这个东西的type是哪什么.\n答案在先进地面粉碎机处揭晓.
block.vne-large-floor-crusher.name = 先进地面粉碎机
block.vne-large-floor-crusher.description = 粉碎易碎地面,以缓慢的速度无限产出沙子.需要电力.\n效率因墙的类型而异.可使用天然气加速.
block.vne-large-floor-crusher.details = 是AttributeCrafter.有没有很意外?\n\n我觉得我把它伪装得很像钻头.
block.vne-ammonia-collector.name = 氨气收集器
block.vne-ammonia-collector.description = 收集喷口喷出的氨气,只能放在氨气喷口上.

block.vne-duct-junction.name = 物品管道交叉器
block.vne-duct-junction.description = 两条交叉物品管道的桥梁.

block.vne-nickel-conveyor.name = 镍传送带
block.vne-nickel-conveyor.description = 镍构造的传送带,速度缓慢.传导物品的同时也能传输电力.
block.vne-manganese-conveyor.name = 锰传送带
block.vne-manganese-conveyor.description = 利用锰进行升级的传送带,优化了传动系统与装甲.传导物品的同时也能传输电力.
block.vne-armored-conveyor.name = 装甲传送带
block.vne-armored-conveyor.description = 进一步升级改造后的传送带,不支持侧边输入,抗打击能力强.传导物品的同时也能传输电力.
block.vne-biomass-conveyor.name = 生物质钢传送带
block.vne-biomass-conveyor.description = 生物质钢构造的特殊传送带,将物品打包后进行运输,效率较高.传导物品的同时也能传输电力.
block.vne-junction.name = 导频交叉器
block.vne-junction.description = 传送带交叉器,允许两条传送带交叉且不互相干扰.传导物品的同时也能传输电力.
block.vne-nickel-bridge.name = 导频传送带桥
block.vne-nickel-bridge.description = 传送带桥,可以跨过5格的障碍传输物品,不依赖电力运行却可以将电力输送到另一端.
block.vne-stack-bridge.name = 打包传送带桥
block.vne-stack-bridge.description = 打包传送带桥,可以跨过9格的障碍传输物品,能适配打包传送带,不依赖电力运行却可以将电力输送到另一端.
block.vne-sorter.name = 导频分类器
block.vne-sorter.description = 分类器,将指定类型的物品向前方输出,其余类型的物品则向两侧输出.传导物品的同时也能传输电力.
block.vne-inverted-sorter.name = 导频反向分类器
block.vne-inverted-sorter.description = 反转分类器逻辑,将指定类型的物品向两侧输出,其余类型的物品则向前方输出.传导物品的同时也能传输电力.
block.vne-overflow-gate.name = 导频溢流门
block.vne-overflow-gate.description = 溢流门,优先向前方输送物品,如果前方已经堆满物品,则将物品向两侧输出.传导物品的同时也能传输电力.
block.vne-underflow-gate.name = 导频反向溢流门
block.vne-underflow-gate.description = 反转溢流门逻辑,优先向两侧输送物品,如果两侧已经堆满物品,则将物品向前方输出.传导物品的同时也能传输电力.
block.vne-router.name = 导频路由器
block.vne-router.description = 分配设备,在一端输入后向其他三个方向平均输出物品.传导物品的同时也能传输电力.
block.vne-distributor.name = 导频分配器
block.vne-distributor.description = 大型分配设备,在一端输入后向其他方向平均输出物品.传导物品的同时也能传输电力.

block.vne-hydraulic-pump.name = 水锤泵
block.vne-hydraulic-pump.description = 液体抽取设备,缓慢抽取液体,无需电力.
block.vne-screw-pump.name = 螺旋泵
block.vne-screw-pump.description = 改进后的液体抽取设备,较快抽取液体,需要电力维持运行.
block.vne-syphon-pump.name = 虹吸泵
block.vne-turbopump.name = 涡轮泵
block.vne-turbopump.description = 泵送液体,需要电力.也可以加氢气提升效率至1.5倍.
block.vne-water-extractor.name = 抽水机
block.vne-water-extractor.description = 抽取地下水.不过抽出来也是盐水.
block.vne-current-conduit.name = 载流导管
block.vne-current-conduit.description = 传输流体的同时传输电力.
block.vne-biomass-conduit.name = 生物质钢导管
block.vne-biomass-conduit.description = 传输流体的同时传输电力,不接受侧面的流体输入,不会发生泄漏.
block.vne-liquid-router.name = 载流液体路由器
block.vne-liquid-router.description = 液体路由器,向一端输入液体后会向其他三个方向平均输出液体.
block.vne-biomass-liquid-router.name = 生物质钢流体路由器
block.vne-biomass-liquid-router.description = 将流体和电力平均分配到所有侧面方向.
block.vne-liquid-container.name = 小型载流液体容器
block.vne-liquid-container.description = 液体存储设施,储存少量液体.
block.vne-liquid-tank.name = 大型载流液体容器
block.vne-liquid-tank.description = 扩充内部体积,加强主结构,增大接口数量,储存较多液体.
block.vne-liquid-junction.name = 载流液体交叉器
block.vne-liquid-junction.description = 两条交叉生载流导管的桥梁.
block.vne-biomass-liquid-junction.name =  生物质钢流体交叉器
block.vne-biomass-liquid-junction.description = 两条交叉生物质钢导管的桥梁.
block.vne-conduit-bridge.name = 载流导管桥
block.vne-conduit-bridge.description = 导管桥,可跨越5格障碍运输流体和电力.
block.vne-biomass-conduit-bridge.name = 生物质钢流体带桥
block.vne-biomass-conduit-bridge.description = 跨越任意地形或建筑物传输流体和电力.

block.vne-neoplasm-collecter.name = 瘤液收集器
block.vne-neoplasm-collecter.description = 将范围内溅落在地上的瘤液收集起来.
block.vne-neoplasm-collecter.details = 和某些建筑配合可以整出无限瘤液.
block.vne-reinforced-force-projector.name = 强化力墙投影
block.vne-reinforced-force-projector-large.name = 强化大型力墙投影
block.vne-oxide-wall.name = 氧化物墙
block.vne-oxide-wall.description = 保护己方建筑,挡下敌方炮弹.能吸收激光和电弧,但也会阻止电力节点自动连接.能吸附散落在地上的瘤液,不过存在吸附极限.
block.vne-oxide-wall-large.name = 大型氧化物墙
block.vne-oxide-wall-large.description = 保护己方建筑,挡下敌方炮弹.能吸收激光和电弧,但也会阻止电力节点自动连接.能吸附散落在地上的瘤液,不过存在吸附极限.
block.vne-coagulant-ingot-wall.name = 蚀凝瘤块墙
block.vne-coagulant-ingot-wall.description = 吸附了过多瘤液的氧化物墙,却依旧挺立在自己的岗位上.能吸收激光和电弧,但也会阻止电力节点自动连接.被攻击会释放瘤液.
block.vne-coagulant-ingot-wall-large.name = 大型蚀凝瘤块墙
block.vne-coagulant-ingot-wall-large.description = 吸附了过多瘤液的大型氧化物墙,却依旧挺立在自己的岗位上.能吸收激光和电弧,但也会阻止电力节点自动连接.被攻击会释放瘤液.
block.vne-silicon-nitride-wall.name = 氮化物墙
block.vne-silicon-nitride-wall.description = 保护己方建筑,挡下敌方炮弹.能吸收激光和电弧,但也会阻止电力节点自动连接.
block.vne-silicon-nitride-wall-large.name = 大型氮化物墙
block.vne-silicon-nitride-wall-large.description = 保护己方建筑,挡下敌方炮弹.能吸收激光和电弧,但也会阻止电力节点自动连接.
block.vne-biomass-wall.name = 生物质钢墙
block.vne-biomass-wall.description = 保护己方建筑,挡下敌方炮弹.能吸收激光和电弧,但也会阻止电力节点自动连接.不会被击穿.
block.vne-biomass-wall-large.name = 大型生物质钢墙
block.vne-biomass-wall-large.description = 保护己方建筑,挡下敌方炮弹.能吸收激光和电弧,但也会阻止电力节点自动连接.不会被击穿.
block.vne-explosive.name = 爆炸物
block.vne-explosive.description = 神秘的方盒子,内有烈性炸药,被摧毁或手动激发爆炸.\n\n装入蚀凝瘤块或许能增加爆炸威力.
block.vne-explosive.details = 在战役中频繁使用会大大降低游戏体验,建议真的打不过了再爆破流.

block.vne-defuse.name = 平息
block.vne-defuse.description = 向前方扇形区域内播撒用于清除瘤液的吸附剂
block.vne-defuse.details = 扣1 diffuse 自动变成 defuse

block.vne-unit-incubator.name = 单位培养机
block.vne-unit-incubator.description = 用于培养虫族单位的装置.\n\n若孵化进程被打断，未成熟的畸形体将提前破出.
block.vne-unit-incubator.details = 别看虫族单位血量不高,其实在某些情境下硬得很.
block.vne-shaper.name = 塑形器
block.vne-shaper.description = 用于塑造虫族单位作战形态的装置.\n\n若孵化进程被打断，未成熟的畸形体将提前破出.
block.vne-shaper.details = T2看上去不强,其实还是有点难对付.
block.vne-evolver.name = 异变催生器
block.vne-evolver.description = 催化虫族单位突破进化极限的装置.\n\n若孵化进程被打断，未成熟的畸形体将提前破出.
block.vne-evolver.details = T3单位需要大量的生物质来建造,但它们带来的战术价值绝对对得起这份消耗.\n\n人话:没有一个好对付的
block.vne-laboratory.name = 瘤液实验室
block.vne-laboratory.description = 将瘤液转化为粘稠的,扭曲的,蠕动的,令人作呕的一坨无定型肿瘤聚集体的工厂.\n\n其作用过程异常地紊乱,因此产生的单位无法控制.
block.vne-laboratory.details = 某种意义上,这是处理瘤液的一种方法.\n虽然污染比直接排放还大.

block.vne-node-diode.name = 激光节点二极管
block.vne-node-diode.description = 单向传输电力.
block.vne-assistant-battery.name = 辅助电池
block.vne-assistant-battery.description = 用于存储电力的电池,与激光节点二极管配合使用.
block.vne-assistant-battery.details = 一节更比六节强.
block.vne-oxidation-chamber.name = 氧化反应室
block.vne-oxidation-chamber.description = 燃烧氨气的发电机,需要输入臭氧.只能放在氨气喷口上.
block.vne-oxidation-chamber.details = 在埃里克尔这个水贵比(芳)油的地方,当然要把反应产生的水收集起来啊.
block.vne-biomass-reactor.name = 生物反应堆
block.vne-biomass-reactor.description = 我们的工程师提出了一个惊为天人的主意:利用瘤液增值的产热来发电. 这便是试验的结果.\n\n但说实话,这玩意稳定性堪忧:不稳定性太高了会炸,瘤液堆满了也会炸;重点是它污染还不小.\n\n如果可以的话,还是用正规的瘤变反应堆吧.
block.vne-biomass-reactor.details = 其实它有个外号叫双爆反应堆.
block.vne-monitor.name = 电网监测器
block.vne-monitor.description = 用于监测电网发电蓄电的工具.